spring:
  application:
    name: ufoTracker

  cache:
    type: redis
    cache-names:
      - casosUfo
      - avistamentos
    redis:
      time-to-live: 10m
      cache-null-values: false

  data:
    redis:
      host: redis-service
      port: 6379

  datasource:
    url: jdbc:postgresql://postgres-service:5432/${DB_NAME}
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        hibernate.jdbc.time_zone: America/Sao_Paulo
    hibernate:
      ddl-auto: none